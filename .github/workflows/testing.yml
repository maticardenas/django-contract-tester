name: test

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: j178/prek-action@v2
        with:
          prek-version: "0.4.5"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10.7", "3.12.10", "3.14.0"]
        django-version: ["5.2", "6.0"]
        exclude:
          - django-version: 6.0
            python-version: 3.10.7
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - uses: actions/cache@v3
        id: cache-venv
        with:
          path: .venv
          key: ${{ matrix.python-version }}-${{ hashFiles('**/uv.lock') }}-1
      - run: |
          uv sync --all-extras --group dev
        if: steps.cache-venv.outputs.cache-hit != 'true'
      - run: |
          uv pip install "Django==${{ matrix.django-version }}"
      - run: |
          uv run coverage run -m pytest
          uv run coverage xml
          uv run coverage report
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
        if: matrix.python-version == '3.10.7' && matrix.django-version == '5.2'

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
